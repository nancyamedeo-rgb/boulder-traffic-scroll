<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boulder / Denver Traffic — Live</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #111213; --bg-hover: #1e2023;
    --border: rgba(255,255,255,0.08); --border-mid: rgba(255,255,255,0.14);
    --text-primary: #e8e8e8; --text-secondary: #999; --text-dim: #555;
    --red: #c94040; --amber: #c97b1a; --purple: #7065c4;
    --teal: #1e9070; --blue: #3d80c4; --gray: #525252; --info: #3d80c4;
  }
  html, body {
    height: 100%; background: var(--bg); color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 24px; line-height: 1.4; -webkit-font-smoothing: antialiased; overflow: hidden;
  }
  #widget { display: flex; flex-direction: column; height: 100vh; max-width: 640px; margin: 0 auto; }

  /* ── Header ── */
  #header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 12px; border-bottom: 0.5px solid var(--border); flex-shrink: 0;
  }
  #header-left { display: flex; align-items: center; gap: 12px; }
  #header h1 { font-size: 18px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; }
  .badge { font-size: 13px; font-weight: 700; letter-spacing: 0.05em; padding: 3px 10px; border-radius: 99px; }
  .badge-cdot { background: rgba(61,128,196,0.18); color: #7ab4e8; border: 0.5px solid rgba(61,128,196,0.35); }
  #refresh-btn {
    display: flex; align-items: center; gap: 6px; font-size: 14px;
    color: var(--text-secondary); background: none;
    border: 0.5px solid var(--border-mid); border-radius: 6px; padding: 5px 12px; cursor: pointer;
  }
  #refresh-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

  /* ── Airport banner ── */
  #airport-bar {
    display: flex; align-items: center; gap: 10px; padding: 8px 20px;
    border-bottom: 0.5px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
  }
  #airport-label { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
  #airport-status {
    font-size: 14px; font-weight: 600; padding: 3px 12px; border-radius: 99px;
    border: 0.5px solid var(--border-mid); letter-spacing: 0.03em;
  }
  #airport-status.good   { background: rgba(30,144,112,0.18); color: #6dcaaa; border-color: rgba(30,144,112,0.35); }
  #airport-status.delay  { background: rgba(201,123,26,0.18); color: #e8a060; border-color: rgba(201,123,26,0.35); }
  #airport-status.ground { background: rgba(201,64,64,0.18);  color: #e88;    border-color: rgba(201,64,64,0.35); }
  #airport-status.loading{ background: transparent; color: var(--text-dim); }
  #airport-detail { font-size: 13px; color: var(--text-secondary); flex: 1; }

  /* ── Source toggles ── */
  #source-bar {
    display: flex; gap: 6px; padding: 7px 20px; align-items: center;
    border-bottom: 0.5px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
  }
  #source-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; margin-right: 2px; }
  .schip {
    font-size: 12px; font-weight: 700; padding: 2px 10px; border-radius: 99px;
    border: 0.5px solid var(--border-mid); cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.04em; opacity: 0.4; background: none; color: var(--text-secondary);
  }
  .schip.active { opacity: 1; }
  .schip-inc.active  { background: rgba(201,64,64,0.18);   color: #e88;    border-color: rgba(201,64,64,0.35); }
  .schip-road.active { background: rgba(61,128,196,0.18);  color: #7ab4e8; border-color: rgba(61,128,196,0.35); }
  .schip-plan.active { background: rgba(30,144,112,0.18);  color: #6dcaaa; border-color: rgba(30,144,112,0.35); }
  .schip-wz.active   { background: rgba(201,123,26,0.18);  color: #e8a060; border-color: rgba(201,123,26,0.35); }
  #src-counts { margin-left: auto; font-size: 12px; color: var(--text-dim); }

  /* ── Filter bar ── */
  #filter-bar {
    display: flex; gap: 6px; padding: 8px 20px;
    border-bottom: 0.5px solid var(--border); flex-wrap: wrap; flex-shrink: 0;
  }
  .fchip {
    font-size: 14px; font-weight: 500; padding: 4px 13px; border-radius: 99px;
    border: 0.5px solid var(--border-mid); color: var(--text-secondary);
    background: none; cursor: pointer; transition: all 0.15s; letter-spacing: 0.03em;
  }
  .fchip:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.25); }
  .fchip.active { color: #fff; border-color: transparent; }
  .fchip.active[data-cat="all"]          { background: rgba(255,255,255,0.12); }
  .fchip.active[data-cat="crash"]        { background: rgba(201,64,64,0.35);   color: #e88; }
  .fchip.active[data-cat="hazard"]       { background: rgba(201,123,26,0.35);  color: #e8a060; }
  .fchip.active[data-cat="congestion"]   { background: rgba(112,101,196,0.35); color: #a89ee0; }
  .fchip.active[data-cat="construction"] { background: rgba(30,144,112,0.35);  color: #6dcaaa; }
  .fchip.active[data-cat="weather"]      { background: rgba(61,128,196,0.35);  color: #7ab4e8; }
  .fchip.active[data-cat="other"]        { background: rgba(82,82,82,0.4);     color: #aaa; }

  /* ── Status bar ── */
  #status-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 20px; border-bottom: 0.5px solid var(--border); flex-shrink: 0;
  }
  #record-count { font-size: 12px; color: var(--text-dim); }
  #data-lag     { font-size: 12px; color: var(--text-dim); font-style: italic; }

  /* ── Ticker viewport ── */
  #ticker-wrap { flex: 1; position: relative; overflow: hidden; }
  #ticker-wrap::before, #ticker-wrap::after {
    content: ''; position: absolute; left: 0; right: 0; z-index: 2; pointer-events: none; height: 60px;
  }
  #ticker-wrap::before { top: 0;    background: linear-gradient(to bottom, var(--bg), transparent); }
  #ticker-wrap::after  { bottom: 0; background: linear-gradient(to top,   var(--bg), transparent); }
  #ticker-inner { position: absolute; top: 0; left: 0; right: 0; will-change: transform; }

  /* ── Incident rows ── */
  .incident {
    display: grid; grid-template-columns: 4px 20px 1fr auto;
    gap: 0 10px; align-items: start;
    padding: 14px 20px; border-bottom: 0.5px solid var(--border);
  }
  .incident:last-child { border-bottom: none; }
  .dot { align-self: stretch; min-height: 24px; border-radius: 2px; width: 4px; margin-top: 3px; }
  .dot.crash        { background: var(--red); }
  .dot.hazard       { background: var(--amber); }
  .dot.congestion   { background: var(--purple); }
  .dot.construction { background: var(--teal); }
  .dot.weather      { background: var(--blue); }
  .dot.other        { background: var(--gray); }

  /* source pip */
  .src-pip {
    width: 20px; height: 16px; border-radius: 3px; flex-shrink: 0; margin-top: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 800; letter-spacing: 0.02em;
  }
  .src-pip.inc  { background: rgba(201,64,64,0.22);  color: #e88; }
  .src-pip.road { background: rgba(61,128,196,0.22); color: #7ab4e8; }
  .src-pip.plan { background: rgba(30,144,112,0.22); color: #6dcaaa; }
  .src-pip.wz   { background: rgba(201,123,26,0.22); color: #e8a060; }

  .sev-badge {
    display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
    padding: 1px 7px; border-radius: 99px; vertical-align: middle; margin-left: 6px;
  }
  .sev-major { background: rgba(201,64,64,0.25);  color: #e88; }
  .sev-minor { background: rgba(201,123,26,0.2);  color: #e8a060; }

  .inc-type  { font-size: 24px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; line-height: 1.25; }
  .inc-meta  { font-size: 18px; color: var(--text-secondary); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .inc-meta i{ font-size: 15px; }
  .inc-msg   { font-size: 16px; color: var(--text-secondary); margin-top: 5px; line-height: 1.5; font-style: italic; }
  .inc-lanes { font-size: 14px; color: #e88; margin-top: 3px; }
  .inc-date  { font-size: 17px; color: var(--text-dim); white-space: nowrap; padding-top: 3px; text-align: right; }

  #empty-state {
    padding: 50px 20px; text-align: center; color: var(--text-secondary);
    font-size: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px;
  }

  /* ── Footer ── */
  #footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 20px; border-top: 0.5px solid var(--border); flex-shrink: 0;
  }
  #updated { font-size: 13px; color: var(--text-dim); }
  .foot-link { font-size: 13px; color: var(--info); text-decoration: none; display: flex; align-items: center; gap: 4px; opacity: 0.75; }
  .foot-link:hover { opacity: 1; text-decoration: underline; }

  #pause-badge {
    position: absolute; top: 10px; right: 14px; z-index: 10;
    font-size: 12px; color: var(--text-dim);
    background: rgba(0,0,0,0.5); border: 0.5px solid var(--border-mid);
    padding: 2px 8px; border-radius: 99px;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  #pause-badge.visible { opacity: 1; }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="widget">
  <div id="header">
    <div id="header-left">
      <i class="ti ti-road" style="font-size:17px;color:#666;" aria-hidden="true"></i>
      <h1>Boulder / Denver Traffic</h1>
      <span class="badge badge-cdot">CDOT</span>
    </div>
    <button id="refresh-btn" onclick="doRefresh()">
      <i class="ti ti-refresh" id="refresh-icon" style="font-size:12px;" aria-hidden="true"></i>Refresh
    </button>
  </div>

  <div id="airport-bar">
    <span id="airport-label"><i class="ti ti-plane" style="font-size:13px;"></i> DEN</span>
    <span id="airport-status" class="loading">Loading…</span>
    <span id="airport-detail"></span>
  </div>

  <div id="source-bar">
    <span id="source-label">Feeds</span>
    <button class="schip schip-inc  active" id="tog-inc"  onclick="toggleFeed('inc')">Incidents</button>
    <button class="schip schip-road active" id="tog-road" onclick="toggleFeed('road')">Road Conditions</button>
    <button class="schip schip-plan active" id="tog-plan" onclick="toggleFeed('plan')">Planned Events</button>
    <button class="schip schip-wz   active" id="tog-wz"   onclick="toggleFeed('wz')">Work Zones</button>
    <span id="src-counts"></span>
  </div>

  <div id="filter-bar">
    <button class="fchip active" data-cat="all"          onclick="setFilter(this,'all')">All</button>
    <button class="fchip"        data-cat="crash"        onclick="setFilter(this,'crash')">Crash</button>
    <button class="fchip"        data-cat="hazard"       onclick="setFilter(this,'hazard')">Hazard</button>
    <button class="fchip"        data-cat="congestion"   onclick="setFilter(this,'congestion')">Congestion</button>
    <button class="fchip"        data-cat="construction" onclick="setFilter(this,'construction')">Construction</button>
    <button class="fchip"        data-cat="weather"      onclick="setFilter(this,'weather')">Weather</button>
    <button class="fchip"        data-cat="other"        onclick="setFilter(this,'other')">Other</button>
  </div>

  <div id="status-bar">
    <span id="record-count">Loading…</span>
    <span id="data-lag">COtrip live · updates every 5 min</span>
  </div>

  <div id="ticker-wrap">
    <div id="pause-badge">⏸ paused</div>
    <div id="ticker-inner">
      <div id="empty-state"><i class="ti ti-loader spin" style="font-size:26px;"></i> Loading…</div>
    </div>
  </div>

  <div id="footer">
    <span id="updated"></span>
    <a class="foot-link" href="https://www.cotrip.org/list/events" target="_blank">
      COtrip live events <i class="ti ti-external-link" style="font-size:11px;"></i>
    </a>
  </div>
</div>

<script>
// ── Configuration ──────────────────────────────────────────────────────────
var KEY = 'RSP3STM-AB0M1TW-HE3P63Q-TBVEETK';

// Endpoint base — update if your portal shows a different host
var BASE = 'https://data.cotrip.org/api/v1/';

var FEEDS = {
  inc:  { url: BASE + 'incidents',          label: 'INC',  loaded: false },
  road: { url: BASE + 'roadConditions',     label: 'RD',   loaded: false },
  plan: { url: BASE + 'plannedEvents',      label: 'PLN',  loaded: false },
  wz:   { url: BASE + 'workZones',          label: 'WZ',   loaded: false }
};

var FAA_NAS_URL   = 'https://nasstatus.faa.gov/api/airport-status-information';
var FAA_NAS_PROXY = 'https://corsproxy.io/?' + encodeURIComponent(FAA_NAS_URL);
var FAA_URL   = 'https://services.faa.gov/airport/status/DEN?format=application/json';
var FAA_PROXY = 'https://corsproxy.io/?' + encodeURIComponent(FAA_URL);

// Boulder/Denver metro bounding box — wide enough to cover I-70, I-25, US-36
var BBOX = { minLat: 39.2, maxLat: 40.5, minLon: -105.7, maxLon: -104.5 };

// ── State ──────────────────────────────────────────────────────────────────
var allItems     = { inc: [], road: [], plan: [], wz: [] };
var showFeed     = { inc: true, road: true, plan: true, wz: true };
var activeFilter = 'all';
var pendingLoads = 0;

var tickerY      = 0;
var tickerSpeed  = 40;
var tickerPaused = false;
var lastTime     = null;
var rafId        = null;
var totalH       = 0;

// ── Bbox filter ────────────────────────────────────────────────────────────
function inBbox(coords) {
  // coords can be [lon,lat], [[lon,lat],...], or [[[lon,lat],...],...]
  if (!coords || !coords.length) return true;
  var pair = coords;
  // Flatten to first coordinate pair
  while (Array.isArray(pair[0])) pair = pair[0];
  if (typeof pair[0] !== 'number') return true;
  var lon = pair[0], lat = pair[1];
  return lat >= BBOX.minLat && lat <= BBOX.maxLat && lon >= BBOX.minLon && lon <= BBOX.maxLon;
}

// ── Categorize ─────────────────────────────────────────────────────────────
function categorize(feedKey, cat, type, desc) {
  var u = ((cat || '') + ' ' + (type || '') + ' ' + (desc || '')).toUpperCase();
  if (/CRASH|ACCIDENT|COLLISION/.test(u))                         return 'crash';
  if (/WEATHER|WIND|SNOW|ICE|FLOOD|FOG|ADVISO|CHAIN|WINTER/.test(u)) return 'weather';
  if (/HAZARD|DEBRIS|FIRE|SPILL|ANIMAL|DISABLED|OBJECT|ROCK/.test(u)) return 'hazard';
  if (/CONGESTION|SLOW|JAM|HEAVY TRAFFIC/.test(u))                return 'congestion';
  if (/CONSTRUCTION|ROAD WORK|MAINTENANCE|CLOSURE|WORK ZONE|LANE CLOSURE|PROJECT/.test(u)) return 'construction';
  // feed-level fallbacks
  if (feedKey === 'road') return 'weather';      // road conditions = road surface/weather
  if (feedKey === 'plan' || feedKey === 'wz') return 'construction';
  return 'other';
}

// ── Formatting ─────────────────────────────────────────────────────────────
function fmtDate(str) {
  if (!str) return '';
  var d = new Date(str);
  if (isNaN(d)) return '';
  var diff = Date.now() - d;
  if (diff < 0)         return 'upcoming';
  if (diff < 3600000)   return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000)  return Math.floor(diff / 3600000) + 'h ago';
  return Math.floor(diff / 86400000) + 'd ago';
}
function titleCase(s) {
  if (!s) return '';
  return s.toLowerCase().replace(/\b\w/g, function(c) { return c.toUpperCase(); });
}
function laneSummary(laneImpacts) {
  if (!Array.isArray(laneImpacts)) return '';
  var closed = [];
  laneImpacts.forEach(function(li) {
    if (li.closedLaneTypes && li.closedLaneTypes.length) {
      li.closedLaneTypes.forEach(function(lt) {
        closed.push(titleCase(lt) + ' (' + (li.direction || '') + ')');
      });
    }
  });
  return closed.length ? '⚠ ' + closed.join(', ') + ' closed' : '';
}

// ── Parsers per feed type ──────────────────────────────────────────────────
function parseIncidents(data) {
  return getFeatures(data).filter(function(f) { return inBbox(f.geometry && f.geometry.coordinates); })
    .map(function(f) {
      var p = f.properties || {};
      return {
        feedKey:  'inc',
        type:     p.type || p.category || 'Incident',
        route:    p.routeName || '',
        region:   p.region || '',
        msg:      p.travelerInformationMessage || '',
        severity: (p.severity || '').toLowerCase(),
        date:     p.startTime || p.lastUpdated || '',
        laneImpacts: p.laneImpacts || [],
        cat:      categorize('inc', p.category, p.type, p.travelerInformationMessage)
      };
    });
}

function parseRoadConditions(data) {
  // LineString features — road surface/weather conditions
  return getFeatures(data).filter(function(f) { return inBbox(f.geometry && f.geometry.coordinates); })
    .map(function(f) {
      var p = f.properties || {};
      // Road condition fields vary; common ones: condition, roadway, description, routeName
      var condType = p.condition || p.type || p.roadCondition || 'Road Condition';
      var desc     = p.description || p.travelerInformationMessage || p.message || '';
      return {
        feedKey:  'road',
        type:     condType,
        route:    p.routeName || p.roadway || p.route || '',
        region:   p.region || '',
        msg:      desc,
        severity: '',
        date:     p.lastUpdated || p.startTime || '',
        laneImpacts: [],
        cat:      categorize('road', p.category, condType, desc)
      };
    });
}

function parsePlannedEvents(data) {
  return getFeatures(data).filter(function(f) { return inBbox(f.geometry && f.geometry.coordinates); })
    .map(function(f) {
      var p = f.properties || {};
      var proj = p.project || {};
      var typeVal = p.type || proj.status || 'Planned Event';
      var desc    = proj.description || p.description || p.travelerInformationMessage || '';
      return {
        feedKey:  'plan',
        type:     typeVal,
        route:    p.routeName || p.route || '',
        region:   p.region || '',
        msg:      desc.length > 180 ? desc.slice(0, 180) + '…' : desc,
        severity: '',
        date:     proj.startTime || p.startTime || '',
        laneImpacts: [],
        cat:      categorize('plan', p.category, typeVal, desc)
      };
    });
}

function parseWorkZones(data) {
  // WZDx format: feed_info + features
  var features = data.features || [];
  return features.filter(function(f) { return inBbox(f.geometry && f.geometry.coordinates); })
    .map(function(f) {
      var p = f.properties || {};
      // WZDx fields: road_name, direction, vehicle_impact, description, start_date, end_date
      var typeVal = p.vehicle_impact ? titleCase(p.vehicle_impact) : 'Work Zone';
      var desc    = p.description || p.road_name || '';
      return {
        feedKey:  'wz',
        type:     'Work Zone — ' + typeVal,
        route:    p.road_name || '',
        region:   p.direction ? titleCase(p.direction) + 'bound' : '',
        msg:      desc,
        severity: '',
        date:     p.start_date || p.core_details && p.core_details.update_date || '',
        laneImpacts: [],
        cat:      categorize('wz', 'construction', typeVal, desc)
      };
    });
}

function getFeatures(data) {
  if (data && Array.isArray(data.features)) return data.features;
  if (Array.isArray(data)) return data;
  return [];
}

// ── Ticker ─────────────────────────────────────────────────────────────────
function tickerFrame(ts) {
  if (!tickerPaused && lastTime !== null) {
    tickerY -= tickerSpeed * (ts - lastTime) / 1000;
    var halfH = totalH / 2;
    if (halfH > 0 && -tickerY >= halfH) tickerY += halfH;
    document.getElementById('ticker-inner').style.transform = 'translateY(' + tickerY + 'px)';
  }
  lastTime = ts;
  rafId = requestAnimationFrame(tickerFrame);
}
function startTicker() {
  if (rafId) cancelAnimationFrame(rafId);
  tickerY = 0; lastTime = null;
  rafId = requestAnimationFrame(tickerFrame);
}
function pauseTicker(on) {
  tickerPaused = on; lastTime = null;
  document.getElementById('pause-badge').classList.toggle('visible', on);
}
window.addEventListener('DOMContentLoaded', function() {
  var w = document.getElementById('ticker-wrap');
  w.addEventListener('mouseenter', function() { pauseTicker(true); });
  w.addEventListener('mouseleave', function() { pauseTicker(false); });
  w.addEventListener('click',      function() { pauseTicker(!tickerPaused); });
});

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  var combined = [];
  ['inc','road','plan','wz'].forEach(function(k) {
    if (showFeed[k]) allItems[k].forEach(function(i) { combined.push(i); });
  });

  // Sort: incidents/crashes first, then by date descending
  combined.sort(function(a, b) {
    var priority = { crash: 0, hazard: 1, weather: 2, congestion: 3, construction: 4, other: 5 };
    var pa = priority[a.cat] !== undefined ? priority[a.cat] : 5;
    var pb = priority[b.cat] !== undefined ? priority[b.cat] : 5;
    if (pa !== pb) return pa - pb;
    return new Date(b.date || 0) - new Date(a.date || 0);
  });

  var shown = activeFilter === 'all'
    ? combined
    : combined.filter(function(i) { return i.cat === activeFilter; });

  // Update counts
  var counts = {};
  ['inc','road','plan','wz'].forEach(function(k) { counts[k] = allItems[k].length; });
  document.getElementById('src-counts').textContent =
    counts.inc + ' / ' + counts.road + ' / ' + counts.plan + ' / ' + counts.wz;
  document.getElementById('record-count').textContent = shown.length + ' items';

  var inner = document.getElementById('ticker-inner');
  if (!shown.length) {
    inner.innerHTML = '<div id="empty-state">' +
      (pendingLoads > 0 ? '<i class="ti ti-loader spin" style="font-size:26px;"></i> Loading…'
                        : 'No active items for this filter.') +
      '</div>';
    totalH = 0; return;
  }

  var rowsHTML = shown.map(function(inc) {
    var sevBadge = '';
    if (inc.severity === 'major' || inc.severity === 'serious')
      sevBadge = '<span class="sev-badge sev-major">MAJOR</span>';
    else if (inc.severity === 'minor')
      sevBadge = '<span class="sev-badge sev-minor">minor</span>';
    var lanes = laneSummary(inc.laneImpacts);
    var metaParts = [];
    if (inc.route)  metaParts.push('<span><i class="ti ti-road" aria-hidden="true"></i> ' + inc.route + '</span>');
    if (inc.region) metaParts.push('<span>' + inc.region + '</span>');
    return '<div class="incident">' +
      '<div class="dot ' + inc.cat + '"></div>' +
      '<div class="src-pip ' + inc.feedKey + '">' + FEEDS[inc.feedKey].label + '</div>' +
      '<div>' +
        '<div class="inc-type">' + titleCase(inc.type) + sevBadge + '</div>' +
        (metaParts.length ? '<div class="inc-meta">' + metaParts.join('') + '</div>' : '') +
        (inc.msg   ? '<div class="inc-msg">'   + inc.msg   + '</div>' : '') +
        (lanes     ? '<div class="inc-lanes">' + lanes     + '</div>' : '') +
      '</div>' +
      '<div class="inc-date">' + fmtDate(inc.date) + '</div>' +
    '</div>';
  }).join('');

  inner.innerHTML = rowsHTML + rowsHTML;
  requestAnimationFrame(function() {
    totalH = inner.scrollHeight;
    tickerY = 0; lastTime = null;
    startTicker();
  });
}

function setFilter(btn, cat) {
  activeFilter = cat;
  document.querySelectorAll('.fchip').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  render();
}
function toggleFeed(key) {
  showFeed[key] = !showFeed[key];
  document.getElementById('tog-' + key).classList.toggle('active', showFeed[key]);
  render();
}

// ── Generic feed loader ────────────────────────────────────────────────────
function loadFeed(key, parser) {
  pendingLoads++;
  var url   = FEEDS[key].url + '?apiKey=' + KEY;
  var proxy = 'https://corsproxy.io/?' + encodeURIComponent(url);

  var attempts = [
    { url: proxy, headers: { 'Accept': 'application/json' } },
    { url: proxy, headers: { 'Accept': 'application/json', 'Authorization': 'Bearer ' + KEY } }
  ];
  var idx = 0;

  function tryNext() {
    if (idx >= attempts.length) {
      pendingLoads--;
      FEEDS[key].loaded = true;
      render(); return;
    }
    var a = attempts[idx++];
    fetch(a.url, { headers: a.headers })
      .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function(data) {
        allItems[key] = parser(data);
        FEEDS[key].loaded = true;
        pendingLoads--;
        updateTimestamp();
        render();
      })
      .catch(tryNext);
  }
  tryNext();
}

function loadAllFeeds() {
  allItems = { inc: [], road: [], plan: [], wz: [] };
  loadFeed('inc',  parseIncidents);
  loadFeed('road', parseRoadConditions);
  loadFeed('plan', parsePlannedEvents);
  loadFeed('wz',   parseWorkZones);
}

function updateTimestamp() {
  if (pendingLoads === 0) {
    document.getElementById('updated').textContent =
      'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    document.getElementById('refresh-icon').classList.remove('spin');
  }
}

// ── Airport ────────────────────────────────────────────────────────────────
function loadAirport() {
  var el  = document.getElementById('airport-status');
  var det = document.getElementById('airport-detail');
  el.className = 'loading'; el.textContent = 'Loading…'; det.textContent = '';
  fetch(FAA_NAS_PROXY)
    .then(function(r) { if (!r.ok) throw new Error(); return r.text(); })
    .then(function(txt) { applyNasStatus(txt, 'DEN', 'KDEN', el, det); })
    .catch(function() { el.className = 'loading'; el.textContent = 'DEN status unavailable'; });
}

function applyNasStatus(txt, iata, icao, el, det) {
  var re = new RegExp('\\b(' + iata + '|' + icao + ')\\b', 'i');
  var hasAirport = re.test(txt);
  if (!hasAirport) {
    el.className = 'good'; el.textContent = '✓ No delays';
    det.textContent = iata + ' — no NAS advisories';
    return;
  }
  var lines = txt.split('\n').filter(function(l) { return re.test(l); });
  var isStop  = lines.some(function(l) { return /ground stop/i.test(l); });
  var isDelay = lines.some(function(l) { return /ground delay|delay program/i.test(l); });
  if (isStop)       { el.className = 'ground'; el.textContent = '✈ Ground Stop'; }
  else if (isDelay) { el.className = 'delay';  el.textContent = '⚠ Ground Delay'; }
  else              { el.className = 'delay';  el.textContent = '⚠ Advisory'; }
  var summary = (lines[0] || '').trim().replace(/\s+/g, ' ');
  det.textContent = summary.length > 100 ? summary.slice(0, 100) + '…' : summary;
}
function applyAirport(d, el, det) {
  var hasDelay = d.delay === 'true' || d.delay === true;
  if (!hasDelay) {
    el.className = 'good'; el.textContent = '✓ No delays';
    det.textContent = (d.weather && d.weather.weather)
      ? (d.weather.weather.Temp || '') + ' · ' + (d.weather.weather.Weather || '') : '';
  } else {
    el.className = 'delay'; el.textContent = '⚠ Delay';
    det.textContent = ((d.status && d.status.reason) || '') +
                      ((d.status && d.status.avgDelay) ? ' · avg ' + d.status.avgDelay : '');
  }
}

// ── Refresh ────────────────────────────────────────────────────────────────
function doRefresh() {
  document.getElementById('refresh-icon').classList.add('spin');
  render();
  loadAllFeeds();
  loadAirport();
}

// ── Boot ───────────────────────────────────────────────────────────────────
loadAllFeeds();
loadAirport();
setInterval(loadAllFeeds, 300000);
setInterval(loadAirport,  600000);
</script>
